<!DOCTYPE html>
<html>
<head>
<title>Payment Simulation</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
}

form{
background:white;
padding:20px;
width:300px;
margin:auto;
}

input{
padding:8px;
margin:5px;
width:90%;
}

button{
padding:10px;
background:green;
color:white;
border:none;
}

</style>

</head>

<body>

<h2>Online Payment</h2>

<form action="process_payment.php" method="POST">

<input type="number" name="user_id" required>

Merchant ID:
<input type="number" name="merchant_id" required>

Amount:
<input type="number" name="amount" required>

<br><br>

<button type="submit">Pay Now</button>

</form>

</body>
</html>
